<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nwfella — GPU Portfolio</title>
  <meta name="description" content="WebGPU-powered interactive portfolio by nwfella" />
  <meta name="theme-color" content="#0a0a12" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; color: #e0e0e0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    canvas#gpu-canvas { display: block; width: 100%; height: 100%; position: fixed; top: 0; left: 0; }
    #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    #ui-overlay > * { pointer-events: auto; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a12; z-index: 100; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; }
    #loading-screen h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.3em; margin-bottom: 2rem; opacity: 0.7; }
    .loader-bar { width: 240px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden; }
    .loader-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6c5ce7, #a29bfe, #6c5ce7); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 1px; transition: width 0.3s ease; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    #loading-status { margin-top: 1rem; font-size: 0.8rem; opacity: 0.4; letter-spacing: 0.1em; }
    #fallback-portfolio { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; background: #0a0a12; z-index: 50; padding: 4rem 2rem; }
    #fallback-portfolio.visible { display: block; }
    .fallback-inner { max-width: 800px; margin: 0 auto; }
    .fallback-inner h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .fallback-inner .subtitle { opacity: 0.6; margin-bottom: 2rem; }
    .fallback-inner .project { padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .fallback-inner .project h3 { font-size: 1.2rem; margin-bottom: 0.3rem; }
    .fallback-inner .project p { opacity: 0.6; font-size: 0.9rem; }
    .fallback-inner .skills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .fallback-inner .skill-tag { padding: 0.3rem 0.8rem; background: rgba(108,92,231,0.2); border: 1px solid rgba(108,92,231,0.3); border-radius: 4px; font-size: 0.8rem; }
    .fallback-inner .contact { margin-top: 2rem; display: flex; gap: 1rem; }
    .fallback-inner .contact a { color: #a29bfe; text-decoration: none; }
    .webgpu-badge { position: fixed; bottom: 1rem; right: 1rem; z-index: 20; font-size: 0.65rem; opacity: 0.3; letter-spacing: 0.1em; pointer-events: none; }
    .webgpu-badge span { background: rgba(108,92,231,0.15); padding: 0.2rem 0.6rem; border-radius: 3px; border: 1px solid rgba(108,92,231,0.15); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <canvas id="gpu-canvas"></canvas>

  <div id="ui-overlay"></div>

  <div id="loading-screen">
    <h1>nwfella</h1>
    <div class="loader-bar"><div class="loader-bar-fill" id="loader-fill"></div></div>
    <div id="loading-status">initializing...</div>
  </div>

  <div id="fallback-portfolio"></div>

  <div class="webgpu-badge"><span>⚡ WebGPU</span></div>

  <script type="module" src="/src/core/main.ts"></script>
</body>
</html>
